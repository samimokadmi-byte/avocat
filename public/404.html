<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sami Mokadmi — Avocat</title>
  <script>
    // Redirect all 404s to index.html, preserving the path as a query param
    var path = window.location.pathname;
    var base = '/avocat';
    var redirect = base + '/?p=' + encodeURIComponent(path.replace(base, '')) + window.location.search + window.location.hash;
    window.location.replace(redirect);
  </script>
</head>
<body></body>
</html>
